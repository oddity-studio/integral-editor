name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition name'
        required: false
        default: 'HelloWorld'
      output:
        description: 'Output filename'
        required: false
        default: 'out/video.mp4'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run render
        env:
          PAGES_BASE_PATH: "/integral-editor"
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out/video.mp4
